# Optional Ingress, same idea as the pod-only variant.
# Requires an ingress controller (e.g. ingress-nginx) in the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: bank
    namespace: bank-vm-h93q9
    annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
spec:
    ingressClassName: nginx
    rules:
        - host: bank-vm-h93q9.local
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: frontend-lb
                            port:
                                number: 80
