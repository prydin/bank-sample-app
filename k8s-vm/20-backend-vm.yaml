# Backend running inside a VMware VM Operator VirtualMachine (Ubuntu cloud image).
# cloud-init installs Node.js 20 (NodeSource), clones this repo, builds the
# real TypeScript backend with `npm run build`, and runs it under systemd.
# The VM is selected by the `backend` VirtualMachineService via labels on
# the VirtualMachine itself.

apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachineService
metadata:
    name: backend
    namespace: bank-vm-h93q9
spec:
    type: ClusterIP
    selector:
        app: backend
    ports:
        - name: http
          protocol: TCP
          port: 4000
          targetPort: 4000
---
apiVersion: v1
kind: Secret
metadata:
    name: backend-bootstrap
    namespace: bank-vm-h93q9
type: Opaque
stringData:
    user-data: |
        #cloud-config
        hostname: bank-backend
        package_update: true
        package_upgrade: false
        packages:
          - ca-certificates
          - curl
          - git
        write_files:
          - path: /etc/systemd/system/bank-backend.service
            permissions: '0644'
            content: |
              [Unit]
              Description=Bank backend (Node.js)
              After=network-online.target
              Wants=network-online.target

              [Service]
              Environment=DATABASE_URL=postgres://bank:bank@postgres:5432/bankdb
              Environment=PORT=4000
              Environment=CORS_ORIGIN=*
              Environment=NODE_ENV=production
              WorkingDirectory=/opt/bank-app/backend
              ExecStart=/usr/bin/node dist/index.js
              Restart=always
              RestartSec=5

              [Install]
              WantedBy=multi-user.target
        runcmd:
          - bash -lc "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -"
          - apt-get install -y nodejs
          - git clone https://github.com/prydin/bank-sample-app.git /opt/bank-app
          - bash -lc "cd /opt/bank-app/backend && npm install && npm run build"
          - systemctl daemon-reload
          - systemctl enable --now bank-backend
---
apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachine
metadata:
    name: backend
    namespace: bank-vm-h93q9
    labels:
        app: backend
        backend-lb: vm-lb-selector
spec:
    # Adjust these to a class, image, and StorageClass that exist in your
    # Supervisor namespace -- see the README.
    className: best-effort-small
    # Friendly image name: noble-server-cloudimg-amd64
    imageName: vmi-0f70942d16a5bd4ed
    storageClass: vsan-default-storage-policy
    powerState: PoweredOn
    network:
        hostName: bank-backend
    bootstrap:
        cloudInit:
            rawCloudConfig:
                name: backend-bootstrap
                key: user-data
