# Backend running inside a VMware VM Operator VirtualMachine (Ubuntu cloud image).
# cloud-init installs Node.js 20 (NodeSource), clones this repo, builds the
# real TypeScript backend with `npm run build`, and runs it under systemd.
#
# The frontend VM reaches this backend by hostname via the bind9 DNS server
# (see 05-dns.yaml). No `VirtualMachineService` is needed -- the app VMs talk
# directly to each other on the workload network.

apiVersion: v1
kind: Secret
metadata:
    name: backend-bootstrap
    namespace: bank-vm-h93q9
type: Opaque
stringData:
    user-data: |
        #cloud-config
        hostname: backend
        users:
          - name: ubuntu
            sudo: ALL=(ALL) NOPASSWD:ALL
            shell: /bin/bash
            lock_passwd: false
            ssh_authorized_keys:
              - ssh-rsa  holuser@console
        package_update: true
        package_upgrade: false
        packages:
          - ca-certificates
          - curl
          - git
          - bind9-dnsutils
        write_files:
          - path: /etc/bank/tsig.key
            permissions: '0600'
            content: |
              key "update-key" {
                  algorithm hmac-sha256;
                  secret "C5oOXzv1cN3Sd5VYx7uH+TpKQB8K5J0jSqQ5kPdJfFY=";
              };
          - path: /etc/systemd/resolved.conf.d/bank.conf
            permissions: '0644'
            content: |
              [Resolve]
              DNS=10.1.9.11
              Domains=bank.local
              FallbackDNS=10.1.1.1 8.8.8.8
          - path: /usr/local/sbin/bank-register-dns.sh
            permissions: '0755'
            content: |
              #!/bin/sh
              set -e
              MYIP=$(hostname -I | awk '{print $1}')
              HOST=$(hostname -s)
              nsupdate -k /etc/bank/tsig.key <<EOF
              server 10.1.9.11
              zone bank.local.
              update delete $HOST.bank.local. A
              update add $HOST.bank.local. 60 A $MYIP
              send
              EOF
          - path: /etc/systemd/system/bank-backend.service
            permissions: '0644'
            content: |
              [Unit]
              Description=Bank backend (Node.js)
              After=network-online.target
              Wants=network-online.target

              [Service]
              Environment=DATABASE_URL=postgres://bank:bank@postgres:5432/bankdb
              Environment=PORT=4000
              Environment=CORS_ORIGIN=*
              Environment=NODE_ENV=production
              WorkingDirectory=/opt/bank-app/backend
              ExecStart=/usr/bin/node dist/index.js
              Restart=always
              RestartSec=5

              [Install]
              WantedBy=multi-user.target
        runcmd:
          - systemctl restart systemd-resolved
          - /usr/local/sbin/bank-register-dns.sh
          - bash -lc "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -"
          - apt-get install -y nodejs
          - git clone https://github.com/prydin/bank-sample-app.git /opt/bank-app
          - bash -lc "cd /opt/bank-app/backend && npm install && npm run build"
          - systemctl daemon-reload
          - systemctl enable --now bank-backend
---
apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachine
metadata:
    name: backend
    namespace: bank-vm-h93q9
    labels:
        app: backend
spec:
    # Adjust these to a class, image, and StorageClass that exist in your
    # Supervisor namespace -- see the README.
    className: best-effort-small
    # Friendly image name: noble-server-cloudimg-amd64
    imageName: vmi-0f70942d16a5bd4ed
    storageClass: vsan-default-storage-policy
    powerState: PoweredOn
    network:
        hostName: backend
    bootstrap:
        cloudInit:
            rawCloudConfig:
                name: backend-bootstrap
                key: user-data
