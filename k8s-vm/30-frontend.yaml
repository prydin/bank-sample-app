# Frontend running inside a VMware VM Operator VirtualMachine (Ubuntu cloud image).
# cloud-init installs Node.js 20 + nginx, clones this repo, builds the SPA with
# `npm run build`, deploys the static assets to nginx, and installs the project's
# nginx.conf (which reverse-proxies /api/ to the `backend` Service).

apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachineService
metadata:
    name: frontend
    namespace: bank-vm-h93q9
spec:
    type: ClusterIP
    selector:
        app: frontend
    ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 80
---
apiVersion: v1
kind: Secret
metadata:
    name: frontend-bootstrap
    namespace: bank-vm-h93q9
type: Opaque
stringData:
    user-data: |
        #cloud-config
        hostname: frontend
        users:
          - name: ubuntu
            sudo: ALL=(ALL) NOPASSWD:ALL
            shell: /bin/bash
            lock_passwd: false
            ssh_authorized_keys:
              - ssh-rsa  holuser@console
        package_update: true
        package_upgrade: false
        packages:
          - ca-certificates
          - curl
          - git
          - nginx
          - bind9-dnsutils
        write_files:
          - path: /etc/bank/tsig.key
            permissions: '0600'
            content: |
              key "update-key" {
                  algorithm hmac-sha256;
                  secret "C5oOXzv1cN3Sd5VYx7uH+TpKQB8K5J0jSqQ5kPdJfFY=";
              };
          - path: /etc/systemd/resolved.conf.d/bank.conf
            permissions: '0644'
            content: |
              [Resolve]
              DNS=10.1.9.11
              Domains=bank.local
              FallbackDNS=10.1.1.1 8.8.8.8
          - path: /usr/local/sbin/bank-register-dns.sh
            permissions: '0755'
            content: |
              #!/bin/sh
              set -e
              MYIP=$(hostname -I | awk '{print $1}')
              HOST=$(hostname -s)
              nsupdate -k /etc/bank/tsig.key <<EOF
              server 10.1.9.11
              zone bank.local.
              update delete $HOST.bank.local. A
              update add $HOST.bank.local. 60 A $MYIP
              send
              EOF
        runcmd:
          - systemctl restart systemd-resolved
          - /usr/local/sbin/bank-register-dns.sh
          - bash -lc "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -"
          - apt-get install -y nodejs
          - git clone https://github.com/prydin/bank-sample-app.git /opt/bank-app
          - bash -lc "cd /opt/bank-app/frontend && npm install && npm run build"
          - rm -rf /usr/share/nginx/html
          - cp -r /opt/bank-app/frontend/dist /usr/share/nginx/html
          - rm -f /etc/nginx/sites-enabled/default
          - cp /opt/bank-app/frontend/nginx.conf /etc/nginx/conf.d/bank.conf
          - bash -lc 'for i in $(seq 1 120); do getent hosts backend.bank.local >/dev/null 2>&1 && break; echo "waiting for backend.bank.local..."; sleep 5; done'
          - nginx -t
          - systemctl restart nginx
---
apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachine
metadata:
    name: frontend
    namespace: bank-vm-h93q9
    labels:
        app: frontend
spec:
    # Adjust these to a class, image, and StorageClass that exist in your
    # Supervisor namespace -- see the README.
    className: best-effort-small
    # Friendly image name: noble-server-cloudimg-amd64
    imageName: vmi-0f70942d16a5bd4ed
    storageClass: vsan-default-storage-policy
    powerState: PoweredOn
    network:
        hostName: frontend
    bootstrap:
        cloudInit:
            rawCloudConfig:
                name: frontend-bootstrap
                key: user-data
