# Postgres running inside a VMware VM Operator VirtualMachine (Ubuntu cloud image).
# cloud-init installs the distro `postgresql` package, clones the project to
# get the canonical db/init.sql + db/seed.sql, and applies them. Bootstrap
# only runs on first boot of a fresh VM (delete + recreate to re-seed).

apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachineService
metadata:
    name: postgres
    namespace: bank-vm-h93q9
spec:
    type: ClusterIP
    selector:
        app: postgres
    ports:
        - name: postgres
          protocol: TCP
          port: 5432
          targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
    name: postgres-bootstrap
    namespace: bank-vm-h93q9
type: Opaque
stringData:
    user-data: |
        #cloud-config
        hostname: bank-postgres
        users:
          - name: ubuntu
            sudo: ALL=(ALL) NOPASSWD:ALL
            shell: /bin/bash
            lock_passwd: false
            ssh_authorized_keys:
              - ssh-rsa  holuser@console
        package_update: true
        package_upgrade: false
        packages:
          - postgresql
          - git
        runcmd:
          - git clone https://github.com/prydin/bank-sample-app.git /opt/bank-app
          - |
            set -euo pipefail
            PG_CONF_DIR=$(ls -d /etc/postgresql/*/main | head -n1)
            sed -i "s/^#\?listen_addresses.*/listen_addresses = '*'/" "$PG_CONF_DIR/postgresql.conf"
            echo "host all all 0.0.0.0/0 md5" >> "$PG_CONF_DIR/pg_hba.conf"
          - systemctl restart postgresql
          - sudo -u postgres psql -c "CREATE USER bank WITH PASSWORD 'bank';"
          - sudo -u postgres psql -c "CREATE DATABASE bankdb OWNER bank;"
          - sudo -u postgres psql -d bankdb -f /opt/bank-app/db/init.sql
          - sudo -u postgres psql -d bankdb -f /opt/bank-app/db/seed.sql
          - sudo -u postgres psql -d bankdb -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO bank;"
          - sudo -u postgres psql -d bankdb -c "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO bank;"
---
apiVersion: vmoperator.vmware.com/v1alpha5
kind: VirtualMachine
metadata:
    name: postgres
    namespace: bank-vm-h93q9
    labels:
        app: postgres
spec:
    # The following three values are environment-specific. Run
    #   kubectl -n bank-vm-h93q9 get vmclass,vmimage
    #   kubectl get storageclass
    # to discover what is available in your Supervisor namespace.
    className: best-effort-small
    # Friendly image name: noble-server-cloudimg-amd64
    imageName: vmi-0f70942d16a5bd4ed
    storageClass: vsan-default-storage-policy

    powerState: PoweredOn
    network:
        hostName: bank-postgres
        # Static IP on the workload network. Adjust prefix/gateway/nameservers
        # if your environment differs.
        interfaces:
            - name: eth0
              addresses:
                  - 172.16.203.73/24
              gateway4: 172.16.203.1
              nameservers:
                  - 10.1.1.1
    bootstrap:
        cloudInit:
            rawCloudConfig:
                name: postgres-bootstrap
                key: user-data
