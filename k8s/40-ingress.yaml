# Optional: expose the frontend via an Ingress.
# Requires an ingress controller (e.g. ingress-nginx) in the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: bank
    namespace: bank
    annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
spec:
    ingressClassName: nginx
    rules:
        - host: bank.local
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: frontend
                            port:
                                number: 80
